<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="./assets/css/login.css">
</head>

<body>

    <div class="container">

        <h1>Login</h1>

            Não possui conta?

                Cadastre-se

    </div>

    <script src="./assets/js/auth.js"></script>

</body>

</html>
