name: CI — Biblioteca Pessoal

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build, Test & Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java 21 ───────────────────────────────────────────────────────
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Cache Maven ───────────────────────────────────────────────────
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 4. Permissão mvnw ────────────────────────────────────────────────
      - name: Permissão mvnw
        run: chmod +x mvnw

      # ── 5. Testes + JaCoCo ───────────────────────────────────────────────
      - name: Executar testes e gerar cobertura JaCoCo
        run: ./mvnw verify --batch-mode

      # ── 6. Publicar relatório JaCoCo como artefato ───────────────────────
      - name: Publicar relatório JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14